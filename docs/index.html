<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sitio web en construccion</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --card: #fffdf8;
        --text: #1e1b18;
        --muted: #6d6258;
        --accent: #b86a2f;
        font-family: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(184, 106, 47, 0.16), transparent 36%),
          linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(92vw, 720px);
        padding: 56px 32px;
      }

      .card {
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid rgba(184, 106, 47, 0.18);
        border-radius: 24px;
        padding: 48px 36px;
        box-shadow: 0 20px 60px rgba(41, 28, 20, 0.08);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 16px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 0.78rem;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 6vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        margin: 20px auto 0;
        max-width: 34rem;
        font-size: 1.08rem;
        line-height: 1.7;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">Proximamente</p>
        <h1>Sitio web en construccion</h1>
        <p>
          Estamos trabajando en una nueva version de este sitio. Pronto estara
          disponible con mas contenido y una mejor experiencia.
        </p>
      </section>
    </main>
  </body>
</html>
